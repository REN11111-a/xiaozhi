<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI小智 - 智能问答</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #F0F7FF;
            font-family: 'Comic Neue', 'Segoe UI', '微软雅黑', 'PingFang SC', cursive, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        /* 头部 */
        .header {
            background: linear-gradient(135deg, #42A5F5, #9cccf4);
            padding: 20px;
            text-align: center;
            color: white;
            position: relative;
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.25);
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: 0.3s;
            z-index: 9999; 
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.02);
        }
        
        .robot-icon {
            font-size: 70px;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.95;
        }
        
        /* 聊天区域 */
        .chat-area {
            height: 420px;
            overflow-y: auto;
            padding: 20px;
            background: #F9F9F0;
        }
        
        /* 自定义滚动条 */
        .chat-area::-webkit-scrollbar {
            width: 6px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: #E8D5B7;
            border-radius: 10px;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: #9fd4ff;
            border-radius: 10px;
        }
        
        .message {
            display: flex;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 10px;
            background: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .message-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .message-content {
            max-width: 65%;
            padding: 12px 18px;
            border-radius: 24px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        
        .message.user .message-content {
            background: #99cffb;
            color: white;
            border-bottom-right-radius: 8px;
            box-shadow: 0 2px 8px rgba(232,167,53,0.3);
        }
        
        .message.robot .message-content {
            background: white;
            color: #4A3728;
            border-bottom-left-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid #FFE4B5;
        }
        
        /* 输入区域 */
        .input-area {
            padding: 20px;
            background: white;
            border-top: 2px solid #FFE4B5;
        }
        
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .input-group input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #E8D5B7;
            border-radius: 50px;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
            font-family: inherit;
        }
        
        .input-group input:focus {
            border-color: #42A5F5;
            box-shadow: 0 0 0 3px rgba(232,167,53,0.2);
        }
        
        .input-group button {
            background: #42A5F5;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
        }
        
        .input-group button:hover {
            background: #d18e1f;
            transform: scale(1.02);
        }
        
        .voice-btn {
            background: #4CAF50;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .voice-btn.recording {
            background: #FF6B6B;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        
        .voice-btn:hover {
            opacity: 0.9;
            transform: scale(1.01);
        }
        
        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #E8D5B7;
            border-top: 2px solid #42A5F5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 提示 */
        .tip {
            text-align: center;
            font-size: 12px;
            color: #B0A090;
            margin-top: 12px;
        }
        
        /* 语音按钮图标 */
        .voice-icon {
            font-size: 18px;
        }
        
        @media (max-width: 600px) {
            .message-content {
                max-width: 80%;
                font-size: 14px;
            }
            .message-avatar {
                width: 40px;
                height: 40px;
                font-size: 22px;
            }
            .input-group input {
                font-size: 14px;
                padding: 12px 16px;
            }
            .input-group button {
                padding: 12px 20px;
            }
            .header h1 {
                font-size: 22px;
            }
            .robot-icon {
                font-size: 55px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='http://127.0.0.1:5000/'">← 返回首页</button>
            <div class="robot-icon">🤖</div>
            <h1>✨ AI小智 ✨</h1>
            <p>问我任何问题，我都会用心回答你~</p>
        </div>
        
        <div class="chat-area" id="chatArea">
            <div class="message robot">
                <div class="message-avatar">
                    <img src="/frontend/xiaozhi.png" alt="小智" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%23E8A735%22/%3E%3Ctext x=%2250%22 y=%2270%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2250%22%3E🤖%3C/text%3E%3C/svg%3E'">
                </div>
                <div class="message-content">你好呀！我是AI小智，可以问我任何问题。试试问我"恐龙为什么会灭绝"或者"讲个笑话"吧！</div>
            </div>
        </div>
        
        <div class="input-area">
            <div class="input-group">
                <input type="text" id="questionInput" placeholder="✏️ 输入你的问题..." onkeypress="if(event.keyCode===13) sendQuestion()">
                <button onclick="sendQuestion()">发送 📤</button>
            </div>
            <button class="voice-btn" id="voiceBtn" onclick="toggleVoiceInput()">
                <span class="voice-icon">🎤</span> 语音输入
            </button>
            <div class="tip">💡 提示：点击语音按钮可以说话提问，小智会用语音回答你哦~</div>
        </div>
    </div>

    <script>
        // ========== 语音相关 ==========
        let isRecording = false;
        let currentRecognition = null;
        
        // 聊天区域元素
        const chatArea = document.getElementById('chatArea');
        const questionInput = document.getElementById('questionInput');
        const voiceBtn = document.getElementById('voiceBtn');
        
        // 页面加载时播报欢迎语音
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                speakMessage('你好呀！我是AI小智，可以问我任何问题。试试问我恐龙为什么会灭绝，或者讲个笑话吧');
            }, 500);
        });
        
        // ========== 发送问题到AI ==========
        async function sendQuestion() {
            const question = questionInput.value.trim();
            if (!question) return;
            
            // 显示用户消息
            addMessage('user', question);
            questionInput.value = '';
            
            // 显示加载状态
            addLoadingMessage();
            
            try {
                const response = await fetch('/api/ai_chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: question })
                });
                
                const data = await response.json();
                
                // 移除加载消息
                removeLoadingMessage();
                
                if (data.reply) {
                    addMessage('robot', data.reply);
                    // 语音播报回答
                    speakMessage(data.reply);
                } else {
                    addMessage('robot', '抱歉，我暂时无法回答这个问题，请稍后再试~');
                    speakMessage('抱歉，我暂时无法回答这个问题，请稍后再试');
                }
            } catch (error) {
                console.error('AI请求失败:', error);
                removeLoadingMessage();
                addMessage('robot', '网络好像出问题了，请检查网络后重试~');
                speakMessage('网络好像出问题了，请检查网络后重试');
            }
        }
        
        // ========== 语音输入 ==========
        function toggleVoiceInput() {
            if (isRecording) {
                stopVoiceRecording();
            } else {
                startVoiceRecording();
            }
        }
        
        function startVoiceRecording() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                addMessage('robot', '您的浏览器不支持语音识别，请使用Chrome浏览器');
                speakMessage('您的浏览器不支持语音识别，请使用Chrome浏览器');
                return;
            }
            
            isRecording = true;
            currentRecognition = new SpeechRecognition();
            currentRecognition.lang = 'zh-CN';
            currentRecognition.interimResults = false;
            currentRecognition.continuous = false;
            
            voiceBtn.innerHTML = '<span class="voice-icon">⏹️</span> 停止录音';
            voiceBtn.classList.add('recording');
            
            currentRecognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                questionInput.value = text;
                stopVoiceRecording();
                sendQuestion();
            };
            
            currentRecognition.onerror = () => {
                addMessage('robot', '没听清楚，请再说一遍~');
                speakMessage('没听清楚，请再说一遍');
                stopVoiceRecording();
            };
            
            currentRecognition.onend = () => {
                if (isRecording) {
                    stopVoiceRecording();
                }
            };
            
            currentRecognition.start();
            
            // 10秒超时
            setTimeout(() => {
                if (isRecording) {
                    stopVoiceRecording();
                    addMessage('robot', '录音超时，请重试~');
                    speakMessage('录音超时，请重试');
                }
            }, 10000);
        }
        
        function stopVoiceRecording() {
            if (currentRecognition) {
                try {
                    currentRecognition.stop();
                } catch(e) {}
                currentRecognition = null;
            }
            isRecording = false;
            voiceBtn.innerHTML = '<span class="voice-icon">🎤</span> 语音输入';
            voiceBtn.classList.remove('recording');
        }
        
        // ========== 聊天界面操作 ==========
        function addMessage(sender, text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            if (sender === 'user') {
                // 用户头像用小朋友emoji
                messageDiv.innerHTML = `
                    <div class="message-content">${escapeHtml(text)}</div>
                    <div class="message-avatar">🧒</div>
                `;
            } else {
                // 机器人头像用小智图片
                messageDiv.innerHTML = `
                    <div class="message-avatar">
                        <img src="/frontend/xiaozhi.png" alt="小智" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%23E8A735%22/%3E%3Ctext x=%2250%22 y=%2270%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2250%22%3E🤖%3C/text%3E%3C/svg%3E'">
                    </div>
                    <div class="message-content">${escapeHtml(text)}</div>
                `;
            }
            
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function addLoadingMessage() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message robot';
            loadingDiv.id = 'loading-message';
            loadingDiv.innerHTML = `
                <div class="message-avatar">
                    <img src="/frontend/xiaozhi.png" alt="小智" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%23E8A735%22/%3E%3Ctext x=%2250%22 y=%2270%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2250%22%3E🤖%3C/text%3E%3C/svg%3E'">
                </div>
                <div class="message-content"><span class="loading"></span> 小智正在思考中...</div>
            `;
            chatArea.appendChild(loadingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function removeLoadingMessage() {
            const loadingMsg = document.getElementById('loading-message');
            if (loadingMsg) {
                loadingMsg.remove();
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ========== 语音播报 ==========
        function speakMessage(text) {
            fetch('/api/speak', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            }).catch(e => console.log('语音播报失败:', e));
        }
        
        // 页面关闭时清理
        window.addEventListener('beforeunload', () => {
            if (currentRecognition) {
                try {
                    currentRecognition.stop();
                } catch(e) {}
            }
        });
    </script>
    <script src="/frontend/rest_check.js"></script>
    <script src="/frontend/distance_check.js"></script>
</body>
</html>
