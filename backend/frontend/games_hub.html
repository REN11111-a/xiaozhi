<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>游戏分类 - 小智乐园</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: #F0F7FF;
            font-family: 'Comic Neue', 'Comic Neue', 'Segoe UI', cursive, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        /* 头部导航 */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 10px 25px;
            border-radius: 60px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        .back-home {
            background: #E8A735;
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            transition: 0.2s;
        }
        .back-home:hover {
            background: #d18e1f;
        }
        /* 新增：小智形象区域 */
        .robot-welcome {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .robot-avatar {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            border: 4px solid #E8A735;
        }
        .robot-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .robot-greeting {
            background: white;
            padding: 20px 30px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            max-width: 500px;
        }
        .robot-greeting h2 {
            color: #E8A735;
            margin: 0 0 8px;
            font-size: 1.8rem;
        }
        .robot-greeting p {
            color: #7F6B5C;
            margin: 0;
            font-size: 1.1rem;
        }
        h1 {
            text-align: center;
            font-size: 2.2rem;
            color: #4A3728;
            margin: 20px 0 10px;
        }
        .sub {
            text-align: center;
            color: #7F6B5C;
            margin-bottom: 40px;
        }
        /* 分类网格 */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }
        .category-card {
            background: white;
            border-radius: 35px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(232, 167, 53, 0.2);
        }
        .category-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.1);
            border-color: #E8A735;
        }
        .category-icon {
            font-size: 64px;
            margin-bottom: 15px;
        }
        .category-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4A3728;
            margin-bottom: 8px;
        }
        .category-desc {
            font-size: 0.85rem;
            color: #9B8A7A;
        }
        /* 数字人入口按钮样式 */
        .xiaozhi-entry-btn {
            background: #E8A735;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            font-family: inherit;
        }
        .xiaozhi-entry-btn:hover {
            background: #d18e1f;
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.1);
        }
        .entry-container {
            text-align: center;
            margin: 40px 0 20px;
        }
        /* 底部提示 */
        .footer-tip {
            text-align: center;
            color: #B0A090;
            font-size: 0.8rem;
            margin-top: 40px;
        }
        @media (max-width: 600px) {
            .category-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            .category-card {
                padding: 15px 10px;
            }
            .category-icon {
                font-size: 48px;
            }
            .robot-avatar {
                width: 140px;
                height: 140px;
            }
            .robot-greeting h2 {
                font-size: 1.5rem;
            }
            .xiaozhi-entry-btn {
                font-size: 1rem;
                padding: 12px 30px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="game-header">
        <a href="/" class="back-home">← 返回小智主页</a>
        <div style="font-size: 1.2rem;">🎮 游戏乐园</div>
    </div>

    <!-- 小智欢迎区域 -->
    <div class="robot-welcome">
        <div class="robot-avatar">
            <img src="/frontend/xiaozhi.png" alt="小智">
        </div>
        <div class="robot-greeting">
            <h2>👋 嗨！我是小智</h2>
            <p>欢迎来到游戏乐园！选一个你喜欢的分类，开始快乐学习吧~</p>
        </div>
    </div>

    <h1>🎈 选择游戏类别</h1>
    <div class="sub">点击任意分类，开始快乐学习！</div>

    <div class="category-grid">
        <!-- 数学类 -->
        <div class="category-card" onclick="window.location.href='/game/math_quiz'">
            <div class="category-icon">🧮</div>
            <div class="category-title">数学思维</div>
            <div class="category-desc">加减法 · 数字认知 · 逻辑</div>
        </div>
        <!-- 阅读/语言类 -->
        <div class="category-card" onclick="window.location.href='/game/reading'">
            <div class="category-icon">📚</div>
            <div class="category-title">快乐阅读</div>
            <div class="category-desc">识字 · 拼音 · 故事</div>
        </div>
        <!-- 艺术/绘画类 -->
        <div class="category-card" onclick="window.location.href='/game/art'">
            <div class="category-icon">🎨</div>
            <div class="category-title">艺术创想</div>
            <div class="category-desc">涂色 · 手工 · 音乐</div>
        </div>
        <!-- 拼图/观察类 -->
        <div class="category-card" onclick="window.location.href='/game/puzzle'">
            <div class="category-icon">🧩</div>
            <div class="category-title">益智拼图</div>
            <div class="category-desc">记忆配对 · 找不同</div>
        </div>
        <!-- 科学/自然类 -->
        <div class="category-card" onclick="window.location.href='/game/science'">
            <div class="category-icon">🔬</div>
            <div class="category-title">科学探索</div>
            <div class="category-desc">动物 · 自然 · 小实验</div>
        </div>
        <!-- 综合/玩具类 -->
        <div class="category-card" onclick="window.location.href='/game/toy'">
            <div class="category-icon">🧸</div>
            <div class="category-title">玩具工坊</div>
            <div class="category-desc">模拟 · 角色扮演</div>
        </div>
    </div>

    <!-- 小智数字人入口 -->
    <div class="entry-container">
        <button class="xiaozhi-entry-btn" onclick="location.href='/frontend/xiaozhi_2d_to_3d.html'">
            🤖 进入小智数字人
        </button>
    </div>

    <div class="footer-tip">💡 每个分类里都有好几个有趣的小游戏，来试试看吧！</div>
</div>

<script>
    // ========== 全局语音队列 ==========
    let speechQueue = [];
    let isProcessingQueue = false;

    // ========== 持续距离检测（独立于摄像头，一直运行） ==========
    let continuousDistanceInterval = null;
    let lastDistanceWarningTime = 0;

    function stopAllSpeech() {
        speechQueue = [];
        isProcessingQueue = false;
        fetch('/api/stop_speak', { method: 'POST' }).catch(e => console.log('停止语音失败:', e));
    }

    function speakMessage(text) {
        if (!text || text.trim() === '') return;
        stopAllSpeech();
        speechQueue.push(text.trim());
        processSpeechQueue();
    }

    function processSpeechQueue() {
        if (isProcessingQueue) return;
        if (speechQueue.length === 0) return;
        
        isProcessingQueue = true;
        const text = speechQueue.shift();
        const estimatedDuration = Math.max(800, text.length * 200);
        
        fetch('/api/speak', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: text })
        }).then(() => {
            setTimeout(() => {
                isProcessingQueue = false;
                processSpeechQueue();
            }, estimatedDuration);
        }).catch(e => {
            console.log('语音请求失败:', e);
            isProcessingQueue = false;
            processSpeechQueue();
        });
    }

    // ========== 持续距离检测函数 ==========
    function startContinuousDistanceCheck() {
        if (continuousDistanceInterval) clearInterval(continuousDistanceInterval);
        
        continuousDistanceInterval = setInterval(async () => {
            try {
                const response = await fetch('/api/get_distance');
                const data = await response.json();
                
                console.log('游戏乐园-持续距离检测:', data.status, '人脸大小:', data.face_size);
                
                const now = Date.now();
                // 每8秒最多警告一次，避免频繁弹窗
                if (data.status === 'too_close' && now - lastDistanceWarningTime > 8000) {
                    lastDistanceWarningTime = now;
                    showDistanceWarning('too_close');
                } else if (data.status === 'close' && now - lastDistanceWarningTime > 8000) {
                    lastDistanceWarningTime = now;
                    showDistanceWarning('close');
                }
            } catch(e) {
                console.log('持续距离检测失败:', e);
            }
        }, 3000);
    }

    function showDistanceWarning(level) {
        // 先关闭已有的弹窗
        closeDistanceWarning();
        
        // 创建弹窗
        const modal = document.createElement('div');
        modal.id = 'distance-warning-modal';
        modal.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1002;
        `;
        
        let message = '';
        if (level === 'too_close') {
            message = '⚠️ 你离屏幕太近啦！请后退一点，保护小眼睛~';
        } else {
            message = '👀 请离屏幕远一点，保持距离对眼睛好哦~';
        }
        
        modal.innerHTML = `
            <div style="background: #FFF8F0; border-radius: 30px; padding: 30px; max-width: 320px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2);">
                <div style="font-size: 60px; margin-bottom: 15px;">👀</div>
                <h2 style="color: #E8A735; margin-bottom: 15px;">离屏幕太近啦！</h2>
                <p style="color: #6B5B4F; margin-bottom: 20px; font-size: 16px; line-height: 1.5;">${message}</p>
                <button id="close-distance-modal" style="background: #E8A735; color: white; border: none; padding: 10px 25px; border-radius: 50px; font-size: 15px; cursor: pointer; font-weight: bold;">知道啦</button>
            </div>
        `;
        
        document.body.appendChild(modal);
        
        // 语音提醒（只在太近时提醒）
        if (level === 'too_close') {
            speakMessage('你离屏幕太近啦，请后退一点保护眼睛');
        }
        
        // 关闭按钮
        document.getElementById('close-distance-modal').onclick = () => {
            closeDistanceWarning();
        };
        
        // 点击背景关闭
        modal.onclick = (e) => {
            if (e.target === modal) {
                closeDistanceWarning();
            }
        };
        
        // 5秒后自动关闭
        setTimeout(() => {
            closeDistanceWarning();
        }, 5000);
    }

    function closeDistanceWarning() {
        const modal = document.getElementById('distance-warning-modal');
        if (modal) {
            modal.remove();
        }
    }

    // 页面加载完成后，启动距离检测并播报欢迎语音
    document.addEventListener('DOMContentLoaded', () => {
        // 启动持续距离检测
        startContinuousDistanceCheck();
        
        // 欢迎语音
        const welcomeText = "欢迎来到游戏乐园！选一个你喜欢的分类，开始快乐学习吧~";
        speakMessage(welcomeText);
    });
    
    // 页面关闭时清理
    window.addEventListener('beforeunload', () => {
        if (continuousDistanceInterval) {
            clearInterval(continuousDistanceInterval);
        }
        stopAllSpeech();
    });
</script>
<script src="/frontend/rest_check.js"></script>
</body>
</html>
