<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>数学探险岛 - 小智乐园</title>
    <script src="/frontend/distance_check.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #E9F0E6;  /* 参考益智拼图的柔和底色 */
            font-family: 'Comic Neue', 'Segoe UI', cursive, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 头部导航栏 */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 12px 30px;
            border-radius: 60px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 40px;
        }

        .back-home {
            background: #E8A735;
            color: white;
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 40px;
            font-weight: bold;
            transition: 0.2s;
        }

        .back-home:hover {
            background: #d18e1f;
            transform: scale(0.97);
        }

        .header-title {
            font-size: 1.3rem;
            color: #5d4037;
            font-weight: bold;
        }

        /* 机器人欢迎区域 (完全参考拼图风格) */
        .robot-welcome {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .robot-avatar {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 5px solid #E8A735;
            background: #FFF2DF;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;      /* 确保圆角裁切图片 */
            box-shadow: 0 12px 20px rgba(0,0,0,0.1);
        }

        .robot-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .robot-greeting {
            background: white;
            padding: 30px 40px;
            border-radius: 30px;
            max-width: 600px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }

        .robot-greeting h2 {
            color: #E8A735;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .robot-greeting p {
            color: #555;
            font-size: 1.2rem;
            line-height: 1.4;
        }

        /* 游戏主区域 */
        .game-section {
            text-align: center;
            margin-bottom: 50px;
        }

        .game-title {
            font-size: 2.5rem;
            color: #5d4037;
            margin-bottom: 15px;
        }

        .game-subtitle {
            font-size: 1.1rem;
            color: #777;
            margin-bottom: 50px;
        }

        /* 卡片网格 (自适应) */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 30px;
            padding: 0 20px;
        }

        .game-card {
            background: white;
            border-radius: 35px;
            padding: 30px 20px;
            cursor: pointer;
            transition: 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(232, 167, 53, 0.2);
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
        }

        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.12);
            border-color: #E8A735;
            background: #FFFEF8;
        }

        .game-icon {
            font-size: 70px;
        }

        .game-name {
            font-size: 1.6rem;
            font-weight: bold;
            color: #333;
        }

        .game-desc {
            font-size: 0.95rem;
            color: #777;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .robot-welcome {
                flex-direction: column;
                text-align: center;
            }
            .game-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
            .game-icon {
                font-size: 55px;
            }
            .game-name {
                font-size: 1.3rem;
            }
            .robot-greeting {
                padding: 20px 25px;
            }
            .robot-greeting h2 {
                font-size: 1.6rem;
            }
        }

        @media (max-width: 520px) {
            .game-grid {
                grid-template-columns: 1fr;
            }
            .header-title {
                font-size: 1rem;
            }
            .back-home {
                padding: 6px 16px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 头部导航，风格与益智拼图一致 -->
    <div class="game-header">
        <a href="/games" class="back-home">← 返回游戏乐园</a>
        <div class="header-title">🧮 数学探险岛</div>
    </div>

    <!-- 小智机器人欢迎区 (图片+文字) -->
    <div class="robot-welcome">
        <div class="robot-avatar">
            <img src="/frontend/xiaozhi.png" alt="小智机器人">
        </div>
        <div class="robot-greeting">
            <h2>🧠 我是小智 · 数学向导</h2>
            <p>算术、乘法、排序，挑战你的大脑！每完成一题都有语音鼓励哦~</p>
        </div>
    </div>

    <!-- 数学游戏卡片区 -->
    <div class="game-section">
        <h2 class="game-title">🎲 选择数学游戏</h2>
        <p class="game-subtitle">点击卡片，开启智慧冒险！</p>
        <div class="game-grid">
            <!-- 算术大挑战 链接 -->
            <a href="/game/math_quiz/arithmetic" class="game-card">
                <div class="game-icon">🧮</div>
                <div class="game-name">算术大挑战</div>
                <div class="game-desc">加减乘除 · 心算对决</div>
            </a>
            <!-- 乘法记忆赛 链接 -->
            <a href="/game/math_quiz/multiplication" class="game-card">
                <div class="game-icon">✖️</div>
                <div class="game-name">乘法记忆赛</div>
                <div class="game-desc">乘法口诀 · 快速应答</div>
            </a>
            <!-- 数字排序王 链接 -->
            <a href="/game/math_quiz/sorting" class="game-card">
                <div class="game-icon">🔢</div>
                <div class="game-name">数字排序王</div>
                <div class="game-desc">从小到大 · 顺序点击</div>
            </a>
        </div>
    </div>
</div>

<script>
    // --------------------- 增强语音队列 (参考益智拼图，支持打断、顺序播放) ---------------------
    let speechQueue = [];
    let isProcessingQueue = false;

    // 停止所有正在播放或等待的语音 (保持体验清爽)
    function stopAllSpeech() {
        speechQueue = [];
        isProcessingQueue = false;
        // 调用后端停止接口 (如果有实现的话，即使后端没有也不影响)
        fetch('/api/stop_speak', { method: 'POST' }).catch(e => console.log('停止语音非必需:', e));
    }

    // 核心播报函数：队列 + 自动打断旧语音
    function speakMessage(text) {
        if (!text) return;
        // 每次新语音都会清空未播报的队列，只保留最新一句 (避免机器人唠叨)
        stopAllSpeech();
        speechQueue.push(text.trim());
        processSpeechQueue();
    }

    function processSpeechQueue() {
        if (isProcessingQueue) return;
        if (speechQueue.length === 0) return;
        isProcessingQueue = true;
        const text = speechQueue.shift();
        // 估算朗读时长 (每个字大约200ms，最短800ms)
        const estimatedDuration = Math.max(800, text.length * 200);
        fetch('/api/speak', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: text })
        })
        .then(() => {
            // 等待估算时长后播放下一条（通常后端会直接播放，队列机制保证不重叠）
            setTimeout(() => {
                isProcessingQueue = false;
                processSpeechQueue();
            }, estimatedDuration);
        })
        .catch(e => {
            console.log('语音请求失败:', e);
            isProcessingQueue = false;
            processSpeechQueue();
        });
    }

    // 页面加载完成时，小智热情欢迎语
    document.addEventListener('DOMContentLoaded', () => {
        speakMessage("欢迎来到数学探险岛，选一个游戏发挥你的数学天赋吧！");
    });
</script>
<script src="/frontend/rest_check.js"></script>
</body>
</html>
