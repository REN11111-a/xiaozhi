<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>节奏小达人 - 小智乐园</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #F0F0E8; font-family: 'Comic Neue', cursive; display: flex; justify-content: center; padding: 20px; }
        .container { max-width: 700px; width: 100%; background: white; border-radius: 40px; padding: 30px; text-align: center; }
        .back-btn { background: #E8A735; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; margin-bottom: 20px; }
        .rhythm-pad { display: flex; justify-content: center; gap: 20px; margin: 30px 0; }
        .drum { background: #E8A735; width: 100px; height: 100px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; cursor: pointer; box-shadow: 0 8px 0 #b97f10; transition: 0.05s linear; }
        .drum:active { transform: translateY(4px); box-shadow: 0 2px 0 #b97f10; }
        .pattern { margin: 20px 0; font-size: 1.2rem; background: #FFF9E8; padding: 15px; border-radius: 40px; }
        .record-btn { background: #4CAF50; border: none; padding: 12px 25px; border-radius: 40px; font-size: 1rem; cursor: pointer; margin: 10px; }
        .status { font-weight: bold; margin-top: 15px; }
        @media (max-width: 600px) { .drum { width: 70px; height: 70px; font-size: 2rem; } }
    </style>
</head>
<body>
<div class="container">
    <button class="back-btn" onclick="location.href='/game/art'">← 返回艺术分类</button>
    <h2>🥁 节奏小达人</h2>
    <p>听节奏，然后模仿敲击！</p>
    <div class="rhythm-pad">
        <div class="drum" data-sound="咚">🥁</div>
        <div class="drum" data-sound="哒">🎵</div>
    </div>
    <div class="pattern" id="patternDisplay">点击“示范节奏”听一段节奏</div>
    <button class="record-btn" id="demoBtn">🎧 示范节奏</button>
    <button class="record-btn" id="recordBtn">🎤 开始模仿</button>
    <div class="status" id="statusMsg"></div>
</div>
<script src="/frontend/distance_check.js"></script>
<script>
    let demoPattern = [];
    let userPattern = [];
    let isRecording = false;
    const soundMap = { "咚": "drum1", "哒": "drum2" };
    function playSound(sound) {
        // 使用 Web Audio 或简单的蜂鸣? 这里用 speech 模拟或 alert? 改为控制台提示+语音播报
        speakMessage(sound);
        // 视觉反馈
        const drums = document.querySelectorAll('.drum');
        drums.forEach(d => { if(d.innerText === sound) d.style.transform = "scale(0.9)"; setTimeout(()=> d.style.transform = "", 100); });
    }
    function generateDemoPattern() {
        const options = ["咚", "哒"];
        let pattern = [];
        for(let i=0;i<5;i++) pattern.push(options[Math.floor(Math.random()*2)]);
        return pattern;
    }
    async function playDemo() {
        demoPattern = generateDemoPattern();
        document.getElementById('patternDisplay').innerText = "🎵 节奏: " + demoPattern.join(" → ");
        for(let s of demoPattern) {
            playSound(s);
            await new Promise(r => setTimeout(r, 600));
        }
        speakMessage("现在点击“开始模仿”，用下面的鼓重复这个节奏！");
    }
    function startRecording() {
        userPattern = [];
        isRecording = true;
        document.getElementById('statusMsg').innerHTML = "🎤 录音中... 敲击鼓面记录你的节奏";
        speakMessage("开始模仿，请按照示范节奏敲击");
        setTimeout(() => {
            if(isRecording) {
                isRecording = false;
                comparePatterns();
            }
        }, 5000); // 5秒后自动结束
    }
    function addUserSound(sound) {
        if(!isRecording) return;
        userPattern.push(sound);
        playSound(sound);
        if(userPattern.length >= demoPattern.length) {
            isRecording = false;
            comparePatterns();
        }
    }
    function comparePatterns() {
        isRecording = false;
        if(userPattern.length === 0) {
            document.getElementById('statusMsg').innerHTML = "没有录制到节奏，请重试！";
            return;
        }
        let correct = true;
        for(let i=0;i<Math.min(demoPattern.length, userPattern.length); i++) {
            if(demoPattern[i] !== userPattern[i]) { correct = false; break; }
        }
        if(correct && demoPattern.length === userPattern.length) {
            document.getElementById('statusMsg').innerHTML = "🎉 太棒了！节奏完全正确！你是节奏小达人！";
            speakMessage("节奏完全正确，你太厉害了！");
        } else {
            document.getElementById('statusMsg').innerHTML = "❌ 节奏不太对，再听一次示范试试看！";
            speakMessage("节奏不对，再试试看！");
        }
    }
    document.querySelectorAll('.drum').forEach(d => {
        d.addEventListener('click', () => {
            const sound = d.innerText;
            if(isRecording) addUserSound(sound);
            else playSound(sound);
        });
    });
    document.getElementById('demoBtn').addEventListener('click', playDemo);
    document.getElementById('recordBtn').addEventListener('click', startRecording);
    function speakMessage(text) { fetch('/api/speak',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})}).catch(e=>console.log); }
    speakMessage("点击示范节奏，然后模仿敲击！");
</script>
<script src="/frontend/rest_check.js"></script>
</body>
</html>
