<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>植物生长模拟 - 小智乐园</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #D9EAD3;
            font-family: 'Comic Neue', cursive;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: white;
            border-radius: 48px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .back-btn {
            background: #E8A735;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        h2 { color: #5D4037; }
        .plant-area {
            background: #F9F2E0;
            border-radius: 30px;
            padding: 30px;
            margin: 20px 0;
        }
        .plant-emoji {
            font-size: 100px;
            transition: 0.2s;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        .control-btn {
            background: #E8A735;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .slider-group {
            margin: 15px 0;
        }
        input { width: 80%; }
        .status {
            margin-top: 15px;
            font-size: 1rem;
        }
        .reset-btn {
            background: #4CAF50;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <script src="/frontend/distance_check.js"></script>
<div class="container">
    <button class="back-btn" onclick="location.href='/game/science'">← 返回科学分类</button>
    <h2>🌱 植物生长模拟</h2>
    <p>调节阳光💡和水分💧，让植物健康长大！</p>
    <div class="plant-area">
        <div class="plant-emoji" id="plantEmoji">🌱</div>
        <div class="slider-group">💧 水分: <input type="range" id="waterSlider" min="0" max="100" value="50"></div>
        <div class="slider-group">☀️ 阳光: <input type="range" id="sunSlider" min="0" max="100" value="50"></div>
    </div>
    <div class="controls">
        <button class="control-btn" id="waterPlus">+ 浇水</button>
        <button class="control-btn" id="sunPlus">+ 增加光照</button>
    </div>
    <div class="status" id="growthStatus">小苗正在努力生长...</div>
    <button class="reset-btn" id="resetBtn">🌱 重新种植</button>
</div>
<script>
    let water = 50, sun = 50;
    let growthStage = 0; // 0:种子 1:发芽 2:幼苗 3:开花 4:结果
    const stageEmojis = ["🌰","🌱","🌿","🌼","🍎"];
    const stageNames = ["种子","发芽","幼苗","开花","结果"];

    function updatePlant() {
        // 根据水分和阳光计算生长值 (0-100)
        let health = (water + sun) / 2;
        if(health < 20) growthStage = 0;
        else if(health < 40) growthStage = 1;
        else if(health < 60) growthStage = 2;
        else if(health < 80) growthStage = 3;
        else growthStage = 4;
        document.getElementById('plantEmoji').innerHTML = stageEmojis[growthStage];
        let statusText = `${stageNames[growthStage]} | 水分${water} 阳光${sun}`;
        if(water<20) statusText += " 🌵 缺水！";
        if(sun<20) statusText += " 🌥️ 光照不足！";
        if(water>80) statusText += " 💧 水太多啦！";
        if(sun>80) statusText += " 🔥 阳光太强！";
        document.getElementById('growthStatus').innerHTML = statusText;
    }

    function changeWater(delta) {
        water = Math.min(100, Math.max(0, water+delta));
        document.getElementById('waterSlider').value = water;
        updatePlant();
        speakMessage(delta>0 ? "浇了一些水" : "水分减少了");
    }
    function changeSun(delta) {
        sun = Math.min(100, Math.max(0, sun+delta));
        document.getElementById('sunSlider').value = sun;
        updatePlant();
        speakMessage(delta>0 ? "增加了光照" : "光照减少了");
    }
    function resetPlant() {
        water = 50; sun = 50;
        document.getElementById('waterSlider').value = water;
        document.getElementById('sunSlider').value = sun;
        updatePlant();
        speakMessage("重新种下一颗种子，记得照顾好它！");
    }
    function speakMessage(text) {
        fetch('/api/speak',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})}).catch(e=>console.log);
    }
    document.getElementById('waterSlider').addEventListener('input', (e) => { water = parseInt(e.target.value); updatePlant(); });
    document.getElementById('sunSlider').addEventListener('input', (e) => { sun = parseInt(e.target.value); updatePlant(); });
    document.getElementById('waterPlus').addEventListener('click', () => changeWater(10));
    document.getElementById('sunPlus').addEventListener('click', () => changeSun(10));
    document.getElementById('resetBtn').addEventListener('click', resetPlant);
    updatePlant();
    speakMessage("调节水分和阳光，让植物茁壮成长吧！");
</script>
<script src="/frontend/rest_check.js"></script>
</body>
</html>
